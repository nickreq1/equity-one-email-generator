<!DOCTYPE html>
<html>
<head>
    <title>Email Generator</title>
</head>
<body>
    <form id="emailForm">
        <label for="brokerEmail">Broker Email:</label>
        <input type="email" id="brokerEmail" name="brokerEmail" required>
        <button type="submit">Send</button>
    </form>

    <script>
        function sendToHubSpot() {
            const brokerEmail = document.getElementById('brokerEmail').value;
            const data = { brokerEmail: brokerEmail };

            fetch('/api/hubspot-sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
