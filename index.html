<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        label { color: white; }
        input[type='text'], input[type='email'] { margin: 5px 0; padding: 10px; width: 100%; }
        button { margin-top: 10px; padding: 10px; background-color: #28a745; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Email Generator</h1>
    <form id="emailGenerator">
        <label for="clientName">Client Name:</label>
        <input type="text" id="clientName" name="clientName" required>
        <label for="clientEmail">Client Email:</label>
        <input type="email" id="clientEmail" name="clientEmail" required>
        <label for="brokerEmail">Broker Email:</label>
        <input type="email" id="brokerEmail" name="brokerEmail" required>
        <button type="submit">Send to HubSpot</button>
    </form>
    <script>
        document.getElementById('emailGenerator').addEventListener('submit', async (e) => {
            e.preventDefault();
            const clientName = document.getElementById('clientName').value;
            const clientEmail = document.getElementById('clientEmail').value;
            const brokerEmail = document.getElementById('brokerEmail').value;
            const response = await fetch('/api/hubspot-sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientName, clientEmail, brokerEmail })
            });
            const result = await response.json();
            console.log(result);
        });
    </script>
</body>
</html>
